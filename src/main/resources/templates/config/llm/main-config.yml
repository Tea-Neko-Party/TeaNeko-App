# 默认模型 ID，格式必须与模型注册 ID 一致：provider/model。
# 为空时，调用方必须显式指定模型 ID 或在 prompt options 中提供 provider/model。
default-model-id: ""

# 各模型的默认 options。这里的 id 不存在于 LLMModelService 时不会影响启动；
# 只有实际调用该模型时才会读取对应配置。
models: []

# 示例：
# models:
#   - id: "openai/gpt-4.1"
#     api-key: "${OPENAI_API_KEY}"
#     base-url: "https://api.openai.com/v1"
#     temperature: 0.7
#     max-tokens: 2048
#     metadata:
#       organization: ""
