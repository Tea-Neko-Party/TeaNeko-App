# ----- spring framework config -----
spring.application.name=TeaNeko-App
app.version=${version:unknown}
spring.profiles.active=${springProfile:dev}
server.port=6691

# ----- sql config -----
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.threads.virtual.enabled=true

# ----- timer config -----
tea-neko.timer.update-delay-ms=10
tea-neko.cache.general-clean-rate-ms=1000

# ----- bot config -----
tea-neko.bot.default-name=TeaNeko

# ----- other config -----
tea-neko.database.max-retry-count=8